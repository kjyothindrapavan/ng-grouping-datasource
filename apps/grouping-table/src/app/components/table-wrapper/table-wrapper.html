<table mat-table [dataSource]="dataSource">
    <ng-container matColumnDef="name">
        <th mat-header-cell *matHeaderCellDef>Name</th>
        <!-- <td mat-cell *matCellDef="let segment">{{segment.name}}</td> -->
    </ng-container>
    <ng-container matColumnDef="included">
        <th mat-header-cell *matHeaderCellDef>Included</th>
        <td mat-cell *matCellDef="let segment">
            <!-- <input  type="checkbox" name="included" [(ngModel)]="segment.included"> -->
        </td>
    </ng-container>
    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
</table>
